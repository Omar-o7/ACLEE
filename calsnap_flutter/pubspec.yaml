publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  camera: ^0.11.0
  share_plus: ^10.1.0
